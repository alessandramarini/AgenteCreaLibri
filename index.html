<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP Empire Builder - 100 Pages Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&family=Fira+Code:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid #334155; }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #000; font-weight: 800; transition: all 0.3s; }
        .agent-terminal { font-family: 'Fira Code', monospace; background-color: #020617; border: 1px solid #10b981; }
        .terminal-text { color: #34d399; }
        .loader-bar { width: 100%; height: 4px; background-color: #1e293b; border-radius: 2px; overflow: hidden; display: none; }
        .loader-bar.active { display: block; }
        .loader-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.3s ease; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        <header class="border-b border-slate-800 pb-6">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-600">KDP EMPIRE PRO</h1>
            <p class="text-emerald-400 text-sm">Motore: OpenRouter | Capacità: 100+ Pagine</p>
        </header>

        <div class="agent-terminal rounded-2xl p-6 shadow-2xl">
            <h2 class="text-lg font-bold text-emerald-400 mb-4">Console Operativa</h2>
            <div class="bg-black/50 rounded-lg p-4 h-40 overflow-y-auto" id="agentConsole">
                <div class="terminal-text text-xs space-y-1" id="agentLogOutput"></div>
            </div>
            <button id="btnToggleAgent" onclick="toggleAgent()" class="mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-6 rounded-lg w-full">ATTIVA AUTOPILOTA</button>
        </div>

        <div class="glass-panel rounded-2xl p-6">
            <div class="flex justify-between mb-4">
                <h2 class="text-xl font-bold">Manoscritto (Target: >30.000 parole)</h2>
                <button id="btnWriteBook" onclick="triggerManualWrite()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold">SCRIVI CAPITOLO PER CAPITOLO</button>
            </div>
            <div id="writingLoader" class="loader-bar mb-4"><div id="writingProgress" class="loader-progress"></div></div>
            <textarea id="manuscriptContent" rows="20" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-6 text-slate-200 focus:outline-none"></textarea>
            <p id="wordCount" class="text-sm text-slate-400 mt-2">0 parole</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let generatedTOC = ["Introduzione", "Capitolo 1", "Capitolo 2", "Capitolo 3", "Capitolo 4", "Capitolo 5", "Capitolo 6", "Capitolo 7", "Capitolo 8", "Conclusione"];
        let isWriting = false;

        function logAgent(msg) {
            const terminal = document.getElementById('agentLogOutput');
            terminal.innerHTML += `<p>> [${new Date().toLocaleTimeString()}] ${msg}</p>`;
            document.getElementById('agentConsole').scrollTop = 99999;
        }

        async function fetchAIWithRetry(prompt, systemInstruction = "Sei un autore professionista di libri KDP. Scrivi contenuti lunghi, dettagliati e coinvolgenti.") {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider: 'openrouter', prompt, systemText: systemInstruction })
            });
            if (!response.ok) throw new Error("Errore API");
            const data = await response.json();
            return data.text;
        }

        async function generateFullBookCore() {
            if (isWriting) return;
            const msTextarea = document.getElementById('manuscriptContent');
            const progress = document.getElementById('writingProgress');
            const btn = document.getElementById('btnWriteBook');
            const loader = document.getElementById('writingLoader');
            
            isWriting = true; btn.disabled = true; loader.classList.add('active');
            msTextarea.value = ""; 

            for (let i = 0; i < generatedTOC.length; i++) {
                const chapter = generatedTOC[i];
                logAgent(`Scrittura: ${chapter}...`);
                progress.style.width = `${((i) / generatedTOC.length) * 100}%`;

                // PROMPT "PROFITTEVOLE": 3000+ parole per capitolo per garantire volume
                const prompt = `Scrivi il capitolo "${chapter}" per un libro KDP. 
                Sii estremamente dettagliato, usa sottoparagrafi, esempi pratici e un tono professionale. 
                Obiettivo: scrivi almeno 3000 parole per questo singolo capitolo. 
                Non riassumere, espandi ogni concetto.`;

                try {
                    const content = await fetchAIWithRetry(prompt);
                    msTextarea.value += `\n\n# ${chapter}\n\n${content}\n\n---\n\n`;
                    updateWordCount();
                } catch(e) {
                    logAgent(`❌ Errore al ${chapter}, riprovo...`);
                    i--; // Riprova il capitolo
                }
            }
            progress.style.width = `100%`;
            loader.classList.remove('active');
            isWriting = false; btn.disabled = false;
            logAgent("Libro completato: >30.000 parole generate.");
        }

        function updateWordCount() {
            const text = document.getElementById('manuscriptContent').value;
            const count = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').innerText = `${count} parole`;
        }

        function triggerManualWrite() { generateFullBookCore(); }
    </script>
</body>
</html>
